    <!-- ======================================== -->

    <main class="feedback-main">

        <!-- CARD -->

        <section class="quiz-box">

            <!-- TÍTULO -->

            <h1>
                Feedback
            </h1>

            <!-- AVALIAÇÃO -->

            <div class="avaliacao-box">

                <label>
                    Como você avalia nosso site?
                </label>

                <select>

                    <option>
                        0-10
                    </option>

                    <option>0</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>

                </select>

            </div>

            <!-- COMENTÁRIO -->

            <div class="comentario-box">

                <textarea placeholder="Deixe seu comentário..."></textarea>

            </div>

            <!-- PUBLICAR -->

            <div class="publicar-box">

                <label>

                    <input type="checkbox">

                    Publicar comentário publicamente

                </label>

            </div>

            <!-- BOTÃO -->

            <button class="btn-enviar">

                Enviar Feedback

            </button>

        </section>

    </main>
