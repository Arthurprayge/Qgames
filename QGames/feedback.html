<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        QGames | Feedback
    </title>

    <!-- Bootstrap -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
    href="css/style.css">

    <!-- Icons -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

    <!-- ======================================== -->
    <!-- FEEDBACK -->
    <!-- ======================================== -->

    <main class="tela-feedback">

        <!-- ======================================== -->
        <!-- NAVBAR -->
        <!-- ======================================== -->

        <nav class="navbar-feedback">

            <div class="logo-feedback">

                <button class="btn-menu-feedback">

                    <i class="fa-solid fa-bars"></i>

                </button>

                <h1>
                    QGames
                </h1>

            </div>

            <div class="usuario-feedback-topo">

                <i class="fa-regular fa-user"></i>

            </div>

        </nav>

        <!-- ======================================== -->
        <!-- ÁREA PRINCIPAL -->
        <!-- ======================================== -->

        <section class="conteudo-feedback">

            <!-- FUNDO -->

            <div class="fundo-feedback"></div>

            <!-- CARD AVALIAÇÃO -->

            <div class="card-avaliacao">

                <p>
                    Como você avalia o nosso site
                </p>

                <select>

                    <option>
                        0-10
                    </option>

                    <option>
                        0
                    </option>

                    <option>
                        1
                    </option>

                    <option>
                        2
                    </option>

                    <option>
                        3
                    </option>

                    <option>
                        4
                    </option>

                    <option>
                        5
                    </option>

                    <option>
                        6
                    </option>

                    <option>
                        7
                    </option>

                    <option>
                        8
                    </option>

                    <option>
                        9
                    </option>

                    <option>
                        10
                    </option>

                </select>

            </div>

            <!-- TEXTAREA -->

            <textarea
            placeholder="deixe seu comentário..."></textarea>

            <!-- BOTÃO -->

            <button class="btn-enviar-feedback">

                Enviar feedback

            </button>

        </section>

    </main>

</body>
</html>
