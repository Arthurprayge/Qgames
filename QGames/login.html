<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login-cadastro.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <main>
        <div class="position-relative w-100 vh-100 overflow-hidden">

            <img src="img/pexels-pavel-danilyuk-7776903.jpg" alt="Imagem de fundo" class="w-100 vh-100 opacidade img-fundo">

            <div class="position-absolute top-50 start-50 translate-middle text-center">
                <div class="card bg-dark text-white" style="width: 32rem;">
                    <div class="card-header fundo-card-header" style="font-size: 1.7em;  font-weight: bold;">
                        Faça o seu login
                    </div>

                    <div class="card-body">

                        <div class="mb-3">
                            <p class="py-0 my-0 text-start" style="font-size: 0.8em;">E-mail ou Usuário</p>
                            <div class="form-floating">
                                <input type="email" class="form-control" id="floatingInput"
                                    placeholder="name@example.com">
                                <label for="floatingInput">august123@gmail.com</label>
                            </div>
                        </div>

                        <div>
                            <p class="py-0 my-0 text-start" style="font-size: 0.8em;">Senha</p>
                            <div class="form-floating">
                                <input type="password" class="form-control" id="floatingPassword"
                                    placeholder="Password">
                                <label for="floatingPassword">XXXXXXXX</label>
                            </div>
                        </div>
                        <div>
                            <a href="#" class="links">Esqueci a senha</a>
                        </div>
                        <div>
                            <a href="cadastro.html" class="links">Cadastrar-se</a>
                        </div>
                        <hr>
                        <div class="d-grid gap-2 container">
                            <div>
                                <a href="#"
                                    class="btn btn-light btn-custom-hover bg-white border d-flex align-items-center justify-content-start py-2 my-2 text-dark text-decoration-none ps-5 ">
                                    <i class="bi bi-google google-gradient-icon me-3"></i>
                                    <span>Fazer login com o Google</span>
                                </a>
                            </div>

                            <div>
                                <a href="#"
                                    class="btn btn-light btn-custom-hover bg-white border d-flex align-items-center justify-content-start py-2 text-dark text-decoration-none ps-5 ">
                                    <i class="bi bi-facebook text-primary me-3"></i>
                                    <span>Fazer login com o Facebook</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
