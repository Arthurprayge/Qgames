<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo:wght@400;700&display=swap">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/quizstyle.css">
    <title>QGames-quiz</title>
</head>

<body>
    <header>
        <nav>
            <nav class="navbar navbar-expand-lg bg-black">
                <div class="container-fluid">
                    <img class="QG" src="img/logoname.jpeg" alt="">
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Pagina Inicial</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="biblioteca.html">Biblioteca</a>
                            </li>
                        </ul>
                        <form class="d-flex" role="search"></form>
                        <a class="btn btn-outline" href="login.html" type="submit">Login</a>
                        </form>
                    </div>
                </div>
            </nav>
        </nav>
    </header>

    <img src="img/image (1).png" class="imagem-fundo" alt="Background">

    <main class="my-5">
        <div class="container d-flex align-items-center justify-content-center ">
            <div class="row">
                <div class="col-sm">
                    <div class="card bg-dark text-white form-color" style="width: 42rem;">
                        <div class="card-body ">
                            <h3 class="card-title text-center my-4">Escolha o seu orçamento</h5>
                                <hr>
                            <h6 class="card-subtitle mb-2 my-3">Escolha quanto quer investir em um jogo</h6>

                            <div class="col-sm">
                                <ul class="list-inline my-1 mx-4 d-flex justify-content-center">
                                    <li class="list-inline-item tex mx-2"><button class="botao-orcamento text-white">Até
                                            50R$</button></li>
                                    <li class="list-inline-item mx-2"><button class="botao-orcamento text-white">50R$ -
                                            150R$</button></li>
                                    <li class="list-inline-item mx-2"><button class="botao-orcamento text-white">+150R$</button>
                                    </li>
                                </ul>
                            </div>
                            
                            <form>
                                <div class="mb-4">
                                    <label for="rangePreco"
                                        class="form-label text-muted d-flex justify-content-between">
                                        <span><h6 class="card-subtitle mb-2 my-3">Ou escolha manualmente</h6></span>
                                        <span class="price-display">R$ <span id="valorAtual">375</span></span>
                                    </label>

                                    <input type="range" class="form-range custom-range" id="rangePreco" min="50"
                                        max="700" step="1" value="375" oninput="atualizarValor(this.value)">

                                    <div class="d-flex justify-content-between text-muted small mt-2">
                                        <span>R$ 50</span>
                                        <span>R$ 700</span>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                    Aplicar filtro
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="rodape">
            <div class="camp-log">
                <img class="logo" src="img/logo.jpeg" alt="">
            </div>
            <br>
            <div class="infos">
                <div class="company">
                    <h5>COMPANY</h5>
                    <ul class="outros1">
                        <li class="sobrenos">
                            <a href="#" class="link-info">Sobre nós</a>
                        </li>
                        <li class="sobrenos">
                            <a href="#" class="link-info">Garanta cupons</a>
                        </li>
                        <li class="sobrenos">
                            <a href="#" class="link-info">Info link</a>
                        </li>
                    </ul>
                </div>
                <div class="legal">
                    <h5>LEGAL</h5>
                    <ul class="outros2">
                        <li class="sobrenos">
                            <a href="#" class="link-info">Politicas de Privacidade</a>
                        </li>
                        <li class="sobrenos">
                            <a href="#" class="link-info">Politicas de Coockies</a>
                        </li>
                        <li class="sobrenos">
                            <a href="feedback.html" class="link-info">Feedback</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
    <script>
        function atualizarValor(val) {
            document.getElementById('valorAtual').innerText = val;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
